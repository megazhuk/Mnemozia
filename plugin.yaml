# Mnemozia Plugin for Hermes Agent
# Install: git clone https://github.com/megazhuk/Mnemozia.git ~/.hermes/plugins/mnemozia

name: mnemozia
version: 2.0.0
description: "Semantic knowledge base — Mnemozia (Μνημοσύνη). Stack: pg0 (PostgreSQL+pgvector) + llama.cpp + Qwen3-Embedding-0.6B. Store, search, and evolve facts with vector search and versioning."
author: Alexey Zhukovsky
license: MIT

tools:
  - tools/kb_tool.py

toolsets:
  mnemozia:
    description: Mnemozia semantic knowledge base — store, search, update, merge, split facts with vector search
    tools:
      - kb
